name: Android Release

# Builds a release APK and publishes it to the GitHub Releases section.
# Triggers on any pushed tag matching v* (e.g. v0.1.0), or manual dispatch with a tag name.
#
# Signing: if the KEYSTORE_* secrets are set (see .github/CICD.md) the APK is signed with your
# upload key; otherwise it falls back to the debug key so the build still produces an installable
# APK. BACKEND_BASE_URL (a repo *variable*, not a secret) bakes the deployed API URL into the app.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag/name (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # required to create the Release and upload the APK asset

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build + publish APK
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          # Fail fast (and clearly) if the secret didn't decode to a usable keystore —
          # otherwise packageRelease dies minutes later with an opaque DER parse error.
          if ! keytool -list -keystore "$RUNNER_TEMP/release.jks" \
              -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::KEYSTORE_BASE64 did not decode to a valid keystore (or the password/alias is wrong)."
            echo "::error::Recreate it with:  base64 -w0 upload.jks | gh secret set KEYSTORE_BASE64"
            keytool -list -keystore "$RUNNER_TEMP/release.jks" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" 2>&1 | tail -3
            exit 1
          fi
          echo "Keystore OK: alias '$KEY_ALIAS' found."

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 != '' && format('{0}/release.jks', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BACKEND_URL_OVERRIDE: ${{ vars.BACKEND_BASE_URL }}
        # The repo variable only OVERRIDES the committed gradle.properties URL when it is set.
        # (Passing -PBACKEND_BASE_URL="" unconditionally would clobber gradle.properties and
        # silently ship a local-only APK with cloud sync hidden.)
        run: |
          ARGS=()
          if [ -n "$BACKEND_URL_OVERRIDE" ]; then
            ARGS+=("-PBACKEND_BASE_URL=$BACKEND_URL_OVERRIDE")
          fi
          ./gradlew :app:assembleRelease --no-daemon --stacktrace "${ARGS[@]}"

      - name: Verify the baked backend URL
        run: |
          URL=$(grep -o 'BACKEND_BASE_URL = "[^"]*"' app/build/generated/source/buildConfig/release/com/pdfvault/BuildConfig.java | cut -d'"' -f2)
          echo "Baked BACKEND_BASE_URL: '${URL}'"
          echo "**Baked backend URL:** \`${URL:-<empty — cloud sync disabled!>}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$URL" ]; then
            echo "::warning::BACKEND_BASE_URL is empty — this APK is local-only (no cloud sync/login)."
          fi

      - name: Stage APK with a versioned name
        id: apk
        run: |
          src="$(find app/build/outputs/apk/release -name '*.apk' | head -n1)"
          if [ -z "$src" ]; then echo "No APK produced"; exit 1; fi
          out="PdfVault-${TAG}.apk"
          cp "$src" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          if [ "$HAS_KEYSTORE" != "true" ]; then
            echo "> ⚠️ Built with the **debug** signing key (no KEYSTORE_* secrets set)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: PdfVault ${{ env.TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.apk.outputs.path }}
